server {
    listen 80;
    client_max_body_size 50M;   # allow PDF uploads up to 50MB

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;   # SPA routing
    }

    # Proxy API calls to the backend service (strips the /api prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # cloud LLM answers can be slow
    }
}
